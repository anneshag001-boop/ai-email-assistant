# Named Tunnel Configuration
# See deploy/guide.md "Option B" for setup instructions
#
# 1. cloudflared tunnel login
# 2. cloudflared tunnel create ai-email
# 3. Edit this file with your tunnel ID and domain
# 4. cloudflared tunnel route dns ai-email your-domain.duckdns.org
# 5. cloudflared tunnel run ai-email

tunnel: ai-email

# Path to the credentials file created by 'cloudflared tunnel create'
credentials-file: /home/user/.cloudflared/ai-email.json

ingress:
  # Your domain — points to the local app
  - hostname: your-name.duckdns.org
    service: http://localhost:8000

  # Catch-all: return 404 for unknown hostnames
  - service: http_status:404
