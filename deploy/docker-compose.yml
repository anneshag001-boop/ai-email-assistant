version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      spamassassin:
        condition: service_started
    restart: unless-stopped
    environment:
      - USE_POSTGRES=true
      - DATABASE_URL=postgresql://email_assistant:changeme@db:5432/email_assistant
      - SPAMASSASSIN_ENABLED=true
      - SPAMASSASSIN_HOST=spamassassin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: email_assistant
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: email_assistant
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  spamassassin:
    image: instantlinux/spamassassin:latest
    ports:
      - "783:783"
    environment:
      - SAUSER=spamd
      - SAGROUP=spamd
      - OPTIONS=-q -u spamd -g spamd
    restart: unless-stopped

volumes:
  pgdata:
