services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: exposes the app publicly via Cloudflare quick tunnel
  # Start with: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://app:8000 --no-autoupdate
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  data:
