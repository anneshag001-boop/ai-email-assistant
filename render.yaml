services:
  - type: web
    name: ai-email-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OLLAMA_ENABLED
        value: "false"
      - key: GROQ_API_KEY
        sync: false
